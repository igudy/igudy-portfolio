name: Security Scans

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-scans-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forbidden-pattern-scan:
    name: Forbidden Pattern Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run forbidden pattern scan
        run: bash scripts/forbidden-pattern-scan.sh "${{ github.workspace }}"

  supply-chain-guard:
    name: Supply Chain Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan for malware markers in config files
        run: python3 scripts/supply-chain-guard.py scan "${{ github.workspace }}"
